<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Keyboard</title>
    <style>
      :root {
        --page-bg: linear-gradient(180deg, #0f172a 0%, #020617 100%);
        --panel-bg: rgba(15, 23, 42, 0.84);
        --panel-border: rgba(148, 163, 184, 0.18);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --white-key: #f8fafc;
        --white-key-edge: #cbd5e1;
        --white-key-active: #dbeafe;
        --white-key-active-text: #2563eb;
        --black-key: #0f172a;
        --black-key-active: #1e293b;
        --accent: #38bdf8;
        --shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--page-bg);
        color: var(--text);
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .app-card {
        width: min(100%, 960px);
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
        padding: 28px;
      }

      .app-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .eyebrow {
        display: inline-block;
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.8rem);
        line-height: 1.05;
      }

      .subtitle {
        margin: 10px auto 0;
        max-width: 640px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.5;
      }

      .status-bar {
        min-height: 84px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .status-copy {
        text-align: center;
        padding: 12px;
      }

      .status-label {
        display: block;
        color: var(--muted);
        font-size: 0.84rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .status-note {
        display: block;
        margin-top: 8px;
        font-size: clamp(2rem, 8vw, 3.8rem);
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .keyboard-frame {
        position: relative;
        width: 100%;
        border-radius: 24px;
        background: linear-gradient(180deg, #111827 0%, #020617 100%);
        padding: 16px 16px 18px;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12);
      }

      .felt-strip {
        height: 10px;
        width: 100%;
        margin-bottom: 10px;
        border-radius: 999px;
        background: linear-gradient(90deg, #7f1d1d 0%, #991b1b 100%);
      }

      .keyboard {
        position: relative;
        height: 320px;
        user-select: none;
      }

      .white-keys {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 8px;
        height: 100%;
      }

      .key {
        border: 0;
        padding: 0;
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 90ms ease, box-shadow 90ms ease, background 90ms ease;
      }

      .key:focus-visible {
        outline: 3px solid #f59e0b;
        outline-offset: 3px;
      }

      .white-key {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 18px;
        border-radius: 0 0 18px 18px;
        background: linear-gradient(180deg, #ffffff 0%, var(--white-key) 72%, #e2e8f0 100%);
        box-shadow: 0 6px 0 var(--white-key-edge);
      }

      .white-key.is-active {
        transform: translateY(3px);
        background: linear-gradient(180deg, #eff6ff 0%, var(--white-key-active) 100%);
        box-shadow: 0 3px 0 #93c5fd;
      }

      .white-key-label {
        color: #475569;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .white-key.is-active .white-key-label {
        color: var(--white-key-active-text);
      }

      .black-key {
        position: absolute;
        top: 0;
        width: calc((100% - 56px) / 8 * 0.62);
        height: 58%;
        border-radius: 0 0 14px 14px;
        background: linear-gradient(180deg, #111827 0%, #020617 100%);
        box-shadow: 0 8px 18px rgba(2, 6, 23, 0.55);
        z-index: 2;
      }

      .black-key.is-active {
        transform: translateY(2px);
        background: linear-gradient(180deg, #1e293b 0%, var(--black-key-active) 100%);
      }

      .black-key[data-note="C#"] { left: calc(12.5% - (((100% - 56px) / 8 * 0.62) / 2) - 2px); }
      .black-key[data-note="D#"] { left: calc(25% - (((100% - 56px) / 8 * 0.62) / 2) - 2px); }
      .black-key[data-note="F#"] { left: calc(50% - (((100% - 56px) / 8 * 0.62) / 2) + 2px); }
      .black-key[data-note="G#"] { left: calc(62.5% - (((100% - 56px) / 8 * 0.62) / 2) + 2px); }
      .black-key[data-note="A#"] { left: calc(75% - (((100% - 56px) / 8 * 0.62) / 2) + 2px); }

      .legend {
        margin-top: 18px;
        color: var(--muted);
        text-align: center;
        font-size: 0.95rem;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 760px) {
        .app-shell {
          padding: 12px;
        }

        .app-card {
          border-radius: 20px;
          padding: 18px;
        }

        .keyboard {
          height: 240px;
        }

        .white-keys {
          gap: 4px;
        }

        .black-key {
          width: calc((100% - 28px) / 8 * 0.62);
          height: 55%;
        }

        .black-key[data-note="C#"] { left: calc(12.5% - (((100% - 28px) / 8 * 0.62) / 2) - 1px); }
        .black-key[data-note="D#"] { left: calc(25% - (((100% - 28px) / 8 * 0.62) / 2) - 1px); }
        .black-key[data-note="F#"] { left: calc(50% - (((100% - 28px) / 8 * 0.62) / 2) + 1px); }
        .black-key[data-note="G#"] { left: calc(62.5% - (((100% - 28px) / 8 * 0.62) / 2) + 1px); }
        .black-key[data-note="A#"] { left: calc(75% - (((100% - 28px) / 8 * 0.62) / 2) + 1px); }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="app-card" aria-labelledby="app-title">
        <header class="app-header">
          <p class="eyebrow">Canvas-Ready Activity</p>
          <h1 id="app-title">Interactive Keyboard</h1>
          <p class="subtitle">
            Tap or click any key to hear a note. This page is self-contained and can be hosted as a
            standalone webpage for Canvas embedding.
          </p>
        </header>

        <section class="status-bar" aria-live="polite" aria-atomic="true">
          <div class="status-copy">
            <span class="status-label">Last note played</span>
            <span class="status-note" id="note-display">Ready</span>
          </div>
        </section>

        <section class="keyboard-frame" aria-label="Playable one-octave piano">
          <div class="felt-strip" aria-hidden="true"></div>
          <div class="keyboard">
            <div class="white-keys">
              <button class="key white-key" data-note="C" data-frequency="261.63" aria-label="Play C">
                <span class="white-key-label">C</span>
              </button>
              <button class="key white-key" data-note="D" data-frequency="293.66" aria-label="Play D">
                <span class="white-key-label">D</span>
              </button>
              <button class="key white-key" data-note="E" data-frequency="329.63" aria-label="Play E">
                <span class="white-key-label">E</span>
              </button>
              <button class="key white-key" data-note="F" data-frequency="349.23" aria-label="Play F">
                <span class="white-key-label">F</span>
              </button>
              <button class="key white-key" data-note="G" data-frequency="392.00" aria-label="Play G">
                <span class="white-key-label">G</span>
              </button>
              <button class="key white-key" data-note="A" data-frequency="440.00" aria-label="Play A">
                <span class="white-key-label">A</span>
              </button>
              <button class="key white-key" data-note="B" data-frequency="493.88" aria-label="Play B">
                <span class="white-key-label">B</span>
              </button>
              <button class="key white-key" data-note="C5" data-frequency="523.25" aria-label="Play high C">
                <span class="white-key-label">C</span>
              </button>
            </div>

            <button class="key black-key" data-note="C#" data-frequency="277.18" aria-label="Play C sharp">
              <span class="sr-only">C sharp</span>
            </button>
            <button class="key black-key" data-note="D#" data-frequency="311.13" aria-label="Play D sharp">
              <span class="sr-only">D sharp</span>
            </button>
            <button class="key black-key" data-note="F#" data-frequency="369.99" aria-label="Play F sharp">
              <span class="sr-only">F sharp</span>
            </button>
            <button class="key black-key" data-note="G#" data-frequency="415.30" aria-label="Play G sharp">
              <span class="sr-only">G sharp</span>
            </button>
            <button class="key black-key" data-note="A#" data-frequency="466.16" aria-label="Play A sharp">
              <span class="sr-only">A sharp</span>
            </button>
          </div>
          <p class="legend">Audio starts on first interaction. Best embedded in Canvas using an iframe.</p>
        </section>
      </section>
    </main>

    <script>
      (function () {
        var noteDisplay = document.getElementById("note-display");
        var keyElements = Array.prototype.slice.call(document.querySelectorAll(".key"));
        var audioContext = null;
        var masterGain = null;
        var activeTimeouts = new Map();

        function ensureAudioContext() {
          if (!audioContext) {
            var AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) {
              noteDisplay.textContent = "Audio unsupported";
              return null;
            }

            audioContext = new AudioContextClass();
            masterGain = audioContext.createGain();
            masterGain.gain.value = 0.45;
            masterGain.connect(audioContext.destination);
          }

          if (audioContext.state === "suspended") {
            audioContext.resume().catch(function (error) {
              console.error("AudioContext resume failed", error);
            });
          }

          return audioContext;
        }

        function playTone(frequency) {
          var context = ensureAudioContext();
          if (!context || !masterGain) {
            return;
          }

          var oscillator = context.createOscillator();
          var gainNode = context.createGain();
          var now = context.currentTime;
          var duration = 1.5;

          oscillator.type = "triangle";
          oscillator.frequency.setValueAtTime(frequency, now);

          gainNode.gain.setValueAtTime(0.0001, now);
          gainNode.gain.linearRampToValueAtTime(1, now + 0.01);
          gainNode.gain.exponentialRampToValueAtTime(0.6, now + 0.11);
          gainNode.gain.exponentialRampToValueAtTime(0.01, now + duration);

          oscillator.connect(gainNode);
          gainNode.connect(masterGain);
          oscillator.start(now);
          oscillator.stop(now + duration + 1);

          oscillator.addEventListener("ended", function () {
            oscillator.disconnect();
            gainNode.disconnect();
          });
        }

        function markActive(button) {
          var note = button.getAttribute("data-note");
          button.classList.add("is-active");

          if (activeTimeouts.has(note)) {
            window.clearTimeout(activeTimeouts.get(note));
          }

          activeTimeouts.set(
            note,
            window.setTimeout(function () {
              button.classList.remove("is-active");
              activeTimeouts.delete(note);
            }, 300)
          );
        }

        function updateDisplay(note) {
          noteDisplay.textContent = note.replace("5", "");
        }

        function handlePlay(event) {
          event.preventDefault();

          var button = event.currentTarget;
          var note = button.getAttribute("data-note");
          var frequency = parseFloat(button.getAttribute("data-frequency"));

          playTone(frequency);
          markActive(button);
          updateDisplay(note);
        }

        keyElements.forEach(function (button) {
          button.addEventListener("pointerdown", handlePlay);
        });

        document.addEventListener(
          "pointerdown",
          function () {
            ensureAudioContext();
          },
          { once: true }
        );
      })();
    </script>
  </body>
</html>
